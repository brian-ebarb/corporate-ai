supervisor:
  provider: ollama
  model: kimi-k2.5:cloud
  context_length: 256000      # max tokens for this model's context window
  compaction_threshold: 0.5 # compact conversation history at 75% full

executives:
  engineering:
    provider: ollama
    model: qwen3-coder-next:cloud
    context_length: 256000
    compaction_threshold: 0.5
  marketing:
    provider: ollama
    model: deepseek-v3.2:cloud
    context_length: 160000
    compaction_threshold: 0.75
  research:
    provider: ollama
    model: glm-5:cloud
    context_length: 198000
    compaction_threshold: 0.75

workers:
  coder:
    provider: ollama_chat
    model: qwen2.5-coder:14b
    context_length: 32000
    compaction_threshold: 0.80
  qa:
    provider: ollama_chat
    model: qwen2.5-coder:14b
    context_length: 32000
    compaction_threshold: 0.80
  research:
    provider: ollama_chat
    model: gpt-oss:latest
    context_length: 32000
    compaction_threshold: 0.80
  docs:
    provider: ollama_chat
    model: gpt-oss:latest
    context_length: 32000
    compaction_threshold: 0.80

concurrency:
  # Maximum number of workers that can run simultaneously.
  # Set to 1 (default) if running on limited hardware — tasks will queue and
  # run one at a time. Increase if your machine can handle parallel inference.
  max_workers: 1

api_keys:
  anthropic: ""
  openai: ""
  openrouter: ""
  ollama_base_url: "http://localhost:11434"

tools:
  web_search:
    engine: searxng
    url: "http://192.168.0.4:8090/"
